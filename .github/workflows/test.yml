name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,scraping,nlp]"

      - name: Run flake8 (fatal errors only)
        run: |
          flake8 . \
            --select=E9,F63,F7,F82 \
            --exclude=.git,__pycache__,build,dist,.eggs,*.egg-info \
            --show-source \
            --statistics

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.11", "3.12"]
    env:
      MPLBACKEND: Agg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,scraping,nlp]"

      - name: Run pytest
        run: pytest tests -ra
